<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistente RSCE</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
 
#chat-wrapper {
position: fixed;
bottom: 24px;
right: 24px;
z-index: 9999;
display: flex;
flex-direction: column;
align-items: flex-end;
gap: 12px;
}
 
#chatbot-container {
background: white;
border-radius: 12px;
box-shadow: 0 8px 30px rgba(0,0,0,0.2);
display: flex;
flex-direction: column;
width: 370px;
height: 500px;
overflow: hidden;
transform-origin: bottom right;
transition: transform 0.3s ease, opacity 0.3s ease;
}
 
#chatbot-container.hidden {
transform: scale(0.85);
opacity: 0;
pointer-events: none;
}
 
#chat-toggle-btn {
width: 56px;
height: 56px;
border-radius: 50%;
background: none;
border: 3px solid #c9a84c;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
font-size: 24px;
box-shadow: 0 4px 16px rgba(0,0,0,0.25);
transition: background 0.2s, transform 0.2s;
flex-shrink: 0;
}
 
#chat-toggle-btn:hover { background: #c9a84c; transform: scale(1.08); }
 
#chat-header {
background: #1a3a5c;
padding: 12px 16px;
display: flex;
align-items: center;
gap: 10px;
}
 
#chat-header .avatar {
width: 34px;
height: 34px;
border-radius: 50%;
background: #c9a84c;
display: flex;
align-items: center;
justify-content: center;
font-size: 17px;
flex-shrink: 0;
}
 
#chat-header .info { flex: 1; }
#chat-header .info h3 { color: white; font-size: 14px; font-weight: 600; }
#chat-header .info span { color: #c9a84c; font-size: 11px; }
 
#close-btn {
background: none;
border: none;
color: white;
font-size: 20px;
cursor: pointer;
padding: 0;
line-height: 1;
opacity: 0.7;
border-radius: 50%;
width: auto;
height: auto;
}
#close-btn:hover { opacity: 1; background: none; transform: none; }
 
#messages {
flex: 1;
overflow-y: auto;
padding: 14px;
background: #f8f9fa;
display: flex;
flex-direction: column;
gap: 10px;
}
 
.message { display: flex; animation: slideIn 0.25s ease-out; }
 
.message-content {
padding: 9px 13px;
border-radius: 8px;
max-width: 82%;
font-size: 13px;
line-height: 1.45;
word-wrap: break-word;
}
 
.user-message { justify-content: flex-end; }
.user-message .message-content {
background: #1a3a5c;
color: white;
border-bottom-right-radius: 3px;
}
 
.bot-message { justify-content: flex-start; }
.bot-message .message-content {
background: white;
color: #333;
border: 1px solid #e0e0e0;
border-bottom-left-radius: 3px;
}
 
.bot-message .message-content a { color: #1a3a5c; text-decoration: underline; }
 
.bot-typing {
display: flex;
gap: 4px;
padding: 9px 13px;
background: white;
border: 1px solid #e0e0e0;
border-radius: 8px;
border-bottom-left-radius: 3px;
width: fit-content;
}
 
.bot-typing span {
width: 7px;
height: 7px;
border-radius: 50%;
background: #1a3a5c;
animation: typing 1.4s infinite;
}
.bot-typing span:nth-child(2) { animation-delay: 0.2s; }
.bot-typing span:nth-child(3) { animation-delay: 0.4s; }
 
@keyframes typing {
0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
30% { opacity: 1; transform: translateY(-5px); }
}
 
#input-area {
display: flex;
padding: 10px 12px;
border-top: 1px solid #e0e0e0;
background: white;
gap: 8px;
align-items: center;
}
 
#userInput {
flex: 1;
padding: 9px 14px;
border: 1px solid #ddd;
border-radius: 20px;
font-size: 13px;
outline: none;
transition: border-color 0.2s;
}
 
#userInput:focus { border-color: #1a3a5c; }
#userInput::placeholder { color: #aaa; }
 
#send-btn {
padding: 9px 16px;
background: #1a3a5c;
color: white;
border: none;
border-radius: 20px;
cursor: pointer;
font-size: 13px;
font-weight: 600;
transition: background 0.2s;
white-space: nowrap;
}
#send-btn:hover { background: #c9a84c; }
#send-btn:active { transform: scale(0.97); }
 
#messages::-webkit-scrollbar { width: 5px; }
#messages::-webkit-scrollbar-track { background: #f8f9fa; }
#messages::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
 
@keyframes slideIn {
from { opacity: 0; transform: translateY(8px); }
to { opacity: 1; transform: translateY(0); }
}
 
#notification-dot {
position: absolute;
top: 0;
right: 0;
width: 14px;
height: 14px;
background: #c9a84c;
border-radius: 50%;
border: 2px solid white;
display: none;
}
 
#chat-toggle-btn { position: relative; }
</style>
</head>
<body>
<div id="chat-wrapper">
<div id="chatbot-container" class="hidden">
<div id="chat-header">
<img src="https://rsce-chatbot-production-9d34.up.railway.app/Intelligent-Dog-Breeds.jpg" alt="RSCE" style="width:56px;height:56px;object-fit:cover;border-radius:50%;">
<div class="info">
<h3>Asistente RSCE</h3>
<span>En línea</span>
</div>
<button id="close-btn" onclick="toggleChat()">✕</button>
</div>
<div id="messages"></div>
<div id="input-area">
<input type="text" id="userInput" placeholder="Escribe tu pregunta..." autocomplete="off">
<button id="send-btn" onclick="sendMessage()">Enviar</button>
</div>
</div>
 
<button id="chat-toggle-btn" onclick="toggleChat()" title="Abrir asistente RSCE">
<img src="https://rsce-chatbot-production-9d34.up.railway.app/Intelligent-Dog-Breeds.jpg" alt="RSCE" style="width:56px;height:56px;object-fit:cover;border-radius:50%;">
<div id="notification-dot"></div>
</button>
</div>
 
<script>
const API_URL = '/api/chat';
let isWaitingForResponse = false;
let chatHistory = [];
let isOpen = false;
let greeted = false;
 
function toggleChat() {
isOpen = !isOpen;
const container = document.getElementById('chatbot-container');
const dot = document.getElementById('notification-dot');
 
if (isOpen) {
container.classList.remove('hidden');
dot.style.display = 'none';
document.getElementById('userInput').focus();
if (!greeted) {
greeted = true;
addMessage('¡Hola! Soy el asistente de la RSCE. Pregúntame sobre nuestros servicios, socios, eventos o cualquier otra cosa. ¿En qué puedo ayudarte?', 'bot-message');
}
} else {
container.classList.add('hidden');
}
}
 
async function sendMessage() {
if (isWaitingForResponse) return;
const userInput = document.getElementById('userInput');
const message = userInput.value.trim();
if (!message) return;
 
addMessage(message, 'user-message');
userInput.value = '';
userInput.focus();
isWaitingForResponse = true;
 
const typingEl = addTypingIndicator();
 
try {
const response = await fetch(API_URL, {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ message, history: chatHistory })
});
const data = await response.json();
removeTypingIndicator(typingEl);
chatHistory.push({ role: 'user', content: message });
chatHistory.push({ role: 'assistant', content: data.reply });
addMessage(data.reply, 'bot-message');
} catch (error) {
removeTypingIndicator(typingEl);
addMessage('Lo siento, ha ocurrido un error. Por favor inténtalo de nuevo.', 'bot-message');
} finally {
isWaitingForResponse = false;
}
}
 
function addMessage(text, className) {
const messagesDiv = document.getElementById('messages');
const messageEl = document.createElement('div');
messageEl.className = `message ${className}`;
const contentEl = document.createElement('div');
contentEl.className = 'message-content';
contentEl.innerHTML = text.replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
messageEl.appendChild(contentEl);
messagesDiv.appendChild(messageEl);
messagesDiv.scrollTop = messagesDiv.scrollHeight;
}
 
function addTypingIndicator() {
const messagesDiv = document.getElementById('messages');
const messageEl = document.createElement('div');
messageEl.className = 'message bot-message';
messageEl.id = 'typing-indicator';
const typingEl = document.createElement('div');
typingEl.className = 'bot-typing';
typingEl.innerHTML = '<span></span><span></span><span></span>';
messageEl.appendChild(typingEl);
messagesDiv.appendChild(messageEl);
messagesDiv.scrollTop = messagesDiv.scrollHeight;
return messageEl;
}
 
function removeTypingIndicator(element) {
if (element && element.parentNode) element.parentNode.removeChild(element);
}
 
document.getElementById('userInput').addEventListener('keypress', (e) => {
if (e.key === 'Enter' && !isWaitingForResponse) sendMessage();
});
 
setTimeout(() => {
if (!isOpen) {
document.getElementById('notification-dot').style.display = 'block';
}
}, 3000);
</script>
</body>
</html>
